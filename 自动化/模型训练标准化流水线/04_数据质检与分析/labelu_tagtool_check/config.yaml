# 下面为必须修改的配置项
# LabelU 服务地址，改成实际访问地址
base_url: "http://113.141.72.253:38000"

# 从管理员获取的 token，只填 token 本身，不要带 Bearer 前缀
token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MTIsInVzZXJuYW1lIjoiZGVuZ2d1b2p1bkBnbWFpbC5jb20iLCJleHAiOjE3NzY5MjYyMjl9.yGtFInDyKWhwEVp9EEyvI1Y78j_16rQVlhoqF23IodM"

target:
  # 要检查的任务 ID
  task_id: 167
  # 只检查这些状态的样本
  sample_states:
    - "DONE"
  # 全局标签工具名，脚本会忽略大小写匹配 tagTool / tagtool
  tag_tool_name: "tagtool"
  # tagTool.result 里期望的标签数量，不足这个数量会写入 CSV；以后不是 6 时只改这里
  expected_tag_count: 6
  # 标框工具名，脚本会忽略大小写匹配 rectTool / recttool
  box_tool_name: "recttool"
  # rectTool.result 里至少需要的标框数量，小于这个数量会写入 CSV
  min_box_count: 1
  # data.result.width/height 小于等于 0 时写入 CSV
  check_non_positive_result_size: true

# ======================== 下方配置正常情况下无需修改 =========================
request:
  # 按需求固定每页 10 条扫描
  page_size: 10
  # 每次请求之间等待多少秒，避免请求过快
  interval_seconds: 0.05
  # 查询接口超时时间，单位秒
  timeout_seconds: 15
  # 请求失败后最多自动重试几次
  max_retries: 2
  # 是否校验 HTTPS 证书，使用自签证书时改为 false
  verify_ssl: false

output:
  # CSV 输出目录
  dir: "outputs"

# LabelU 服务地址，改成实际访问地址*
base_url: "http://113.141.72.253:38000"

# 从管理员获取的 token，只填 token 本身，不要带 Bearer 前缀*
token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MTIsInVzZXJuYW1lIjoiZGVuZ2d1b2p1bkBnbWFpbC5jb20iLCJleHAiOjE3NzY5MjYyMjl9.yGtFInDyKWhwEVp9EEyvI1Y78j_16rQVlhoqF23IodM"

target:
  # 要操作的任务 ID，只会扫描和删除这个任务下的样本*
  task_id: 167
  sample_states:
    # 默认删除被跳过的样本标签"SKIPPED", 一般还有"DONE"和"NEW"，不要修改
    - "SKIPPED"
# ======================== 下方配置正常情况无需修改 =========================
# 请求相关配置
request:
  # 分页查询时每页拉取多少条样本，常用 100
  page_size: 100
  # 每次请求之间等待多少秒，避免请求过快
  interval_seconds: 0.5
  # 查询接口超时时间，单位秒
  timeout_seconds: 15
  # 请求失败后最多自动重试几次
  max_retries: 2
  # 是否校验 HTTPS 证书，使用自签证书时改为 false
  verify_ssl: false

# 删除相关配置
delete:
  # 每次删除请求提交多少条样本 ID
  batch_size: 100
  # 删除接口超时时间，单位秒
  timeout_seconds: 30
  # 是否跳过人工确认，true 表示扫描完成后直接删除
  auto_confirm: false
  # 是否开启预演模式，true 表示只扫描不删除
  dry_run: false
  # 删除失败时输出的报告文件路径
  fail_report_path: "failed_batches.json"
